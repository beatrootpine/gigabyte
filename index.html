<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230B0B0B' width='100' height='100' rx='22'/><text x='50' y='68' font-size='56' font-weight='700' text-anchor='middle' fill='%23FAFAFA' font-family='Poppins,sans-serif' letter-spacing='-3'>G</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Gigabyte — South Africa's home for music, food, nightlife, comedy and sports. Discover, book and save events across Johannesburg, Cape Town and Durban." />
    <meta name="theme-color" content="#0B0B0B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <meta property="og:title" content="Gigabyte — Event discovery, reimagined" />
    <meta property="og:description" content="South Africa's home for music, food, nightlife, comedy and sports." />
    <meta property="og:type" content="website" />
    
    <title>Gigabyte — event discovery</title>
    
    <script>
      // Apply theme before page renders to avoid flash
      (function() {
        const stored = localStorage.getItem('gigabyte-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
